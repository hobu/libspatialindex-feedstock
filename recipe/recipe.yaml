schema_version: 1

context:
  version: "1.9.3"

package:
  name: libspatialindex
  version: ${{ version }}

source:
  url: https://github.com/libspatialindex/libspatialindex/archive/${{ version }}.tar.gz
  sha256: 7b44340a3edc55c11abfc453bb60f148b29f569cef9e1148583e76132e9c7379

build:
  number: 6
  skip: win and vc<14

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - if: not win
      then: make
    - if: win
      then: ninja
  run_exports:
    - ${{ pin_subpackage('libspatialindex', upper_bound='x.x.x') }}

tests:
  - script:
      - if: not win
        then: test -f ${PREFIX}/lib/libspatialindex_c${SHLIB_EXT}

about:
  license: MIT
  license_file: COPYING
  summary: Extensible framework for robust spatial indexing
  homepage: http://libspatialindex.github.io

extra:
  recipe-maintainers:
    - ocefpaf
    - hobu
